spring:
  datasource:
    url: jdbc:h2:mem:payment_reconciliation_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
    open-in-view: false
  cache:
    type: simple

app:
  jwt:
    secret: local-dev-secret-key-for-payment-project-please-change
    expiration-ms: 86400000
  kafka:
    enabled: false
    topics:
      payment-created: payment-created
      payment-validated: payment-validated
      reconciliation-completed: reconciliation-completed
      fraud-alert: fraud-alert
  redis:
    enabled: false
