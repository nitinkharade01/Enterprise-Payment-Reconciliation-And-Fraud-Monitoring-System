server:
  port: ${SERVER_PORT:${PORT:8080}}

spring:
  profiles:
    default: local
  application:
    name: enterprise-payment-reconciliation-fraud-monitoring
  datasource:
    url: ${DATABASE_URL:jdbc:mysql://localhost:3306/payment_reconciliation_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DATABASE_USERNAME:${MYSQL_USER:root}}
    password: ${DATABASE_PASSWORD:${MYSQL_PASSWORD:root123}}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  cache:
    type: simple

app:
  cors:
    allowed-origin-patterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000}
  jwt:
    secret: ${JWT_SECRET:local-dev-secret-key-for-payment-project-please-change}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  kafka:
    enabled: ${KAFKA_ENABLED:false}
    topics:
      payment-created: payment-created
      payment-validated: payment-validated
      reconciliation-completed: reconciliation-completed
      fraud-alert: fraud-alert
  redis:
    enabled: ${REDIS_ENABLED:false}

management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.cfbp.paymentreconciliation: INFO
