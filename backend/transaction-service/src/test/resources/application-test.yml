spring:
  datasource:
    url: jdbc:h2:mem:transaction_service_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
eureka:
  client:
    enabled: false
app:
  kafka:
    enabled: false
  redis:
    enabled: false
  seed:
    enabled: false
