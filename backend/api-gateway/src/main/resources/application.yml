server:
  port: ${SERVER_PORT:${PORT:8080}}
spring:
  profiles:
    default: local
  application:
    name: api-gateway
  cloud:
    discovery:
      enabled: ${EUREKA_ENABLED:true}
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: ${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:5173,http://localhost:3000}
            allowedMethods: GET,POST,PUT,DELETE,OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      routes:
        - id: auth-service
          uri: lb://auth-service
          predicates: [ Path=/api/auth/** ]
        - id: transaction-service
          uri: lb://transaction-service
          predicates: [ Path=/api/transactions/** ]
        - id: fraud-detection-service
          uri: lb://fraud-detection-service
          predicates: [ Path=/api/fraud-alerts/** ]
        - id: reconciliation-service
          uri: lb://reconciliation-service
          predicates: [ Path=/api/reconciliation/** ]
        - id: notification-service
          uri: lb://notification-service
          predicates: [ Path=/api/notifications/** ]
        - id: reporting-service
          uri: lb://reporting-service
          predicates: [ Path=/api/reports/** ]
eureka:
  client:
    enabled: ${EUREKA_ENABLED:true}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
app:
  frontend-url: ${FRONTEND_URL:http://localhost:5173}
  public-url: ${PUBLIC_BASE_URL:http://localhost:8080}
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-a-very-long-256-bit-key}
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
