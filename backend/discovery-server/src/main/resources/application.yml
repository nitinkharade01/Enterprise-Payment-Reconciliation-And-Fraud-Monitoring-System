server:
  port: ${SERVER_PORT:${PORT:8761}}
spring:
  profiles:
    default: local
  application:
    name: discovery-server
eureka:
  client:
    register-with-eureka: false
    fetch-registry: false
management:
  endpoint:
    health:
      probes:
        enabled: true
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
